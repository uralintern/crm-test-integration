services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.2
    pids_limit: 50
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ric-crm-planner/back
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles

  automation:
    build:
      context: ./ric-crm-planner/back
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles
    command: >
      sh -c "while true; do
      python manage.py run_automation;
      sleep $${AUTOMATION_INTERVAL_SECONDS:-60};
      done"

  testing-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TESTING_DB_NAME}
      POSTGRES_USER: ${TESTING_DB_USER}
      POSTGRES_PASSWORD: ${TESTING_DB_PASSWORD}
    volumes:
      - testing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  testing-backend:
    build:
      context: ./test-constructor/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: host=testing-db user=${TESTING_DB_USER} password=${TESTING_DB_PASSWORD} dbname=${TESTING_DB_NAME} port=5432 sslmode=disable
      DB_HOST: testing-db
      DB_PORT: "5432"
      DB_NAME: ${TESTING_DB_NAME}
      DB_USER: ${TESTING_DB_USER}
      DB_PASSWORD: ${TESTING_DB_PASSWORD}
      ADMIN_EMAIL: ${TESTING_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${TESTING_ADMIN_PASSWORD}
      JWT_SECRET: ${TESTING_JWT_SECRET}
      JWT_TTL_HOURS: ${TESTING_JWT_TTL_HOURS:-24}
      PORT: "8080"
      CLIENT_URL: https://${TESTING_DOMAIN}
      CRM_SERVICE: http://backend:8000
      CRM_TOKEN: ${TESTING_SERVICE_TOKEN}
    depends_on:
      testing-db:
        condition: service_healthy
      backend:
        condition: service_started

  testing-web:
    build:
      context: ./test-constructor/frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - testing-backend

  parser-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PARSER_DB_NAME}
      POSTGRES_USER: ${PARSER_DB_USER}
      POSTGRES_PASSWORD: ${PARSER_DB_PASSWORD}
    volumes:
      - parser_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  parser-api:
    build:
      context: ./internship-parser
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: parser-db
      DB_PORT: 5432
      DB_NAME: ${PARSER_DB_NAME}
      DB_USER: ${PARSER_DB_USER}
      DB_PASSWORD: ${PARSER_DB_PASSWORD}
      APP_HOST: 0.0.0.0
      APP_PORT: ${PARSER_APP_PORT:-8080}
    depends_on:
      parser-db:
        condition: service_healthy

  airflow-init:
    build:
      context: ./internship-parser/airflow
      dockerfile: Dockerfile
    user: "${AIRFLOW_UID:-50000}:0"
    restart: "no"
    mem_limit: 192m
    mem_reservation: 64m
    cpus: 0.15
    pids_limit: 50
    environment: &airflow-common-env
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__PARALLELISM: 4
      AIRFLOW__SCHEDULER__MAX_THREADS: 2
      AIRFLOW__SCHEDULER__MAX_RUNS_PER_DAG: 1
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PARSER_DB_USER}:${PARSER_DB_PASSWORD}@parser-db:5432/${PARSER_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-change-this-before-production}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USERNAME:-airflow}:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json.generated
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-}
      DB_HOST: parser-db
      DB_PORT: 5432
      DB_USER: ${PARSER_DB_USER}
      DB_PASSWORD: ${PARSER_DB_PASSWORD}
      DB_NAME: ${PARSER_DB_NAME}
      PYTHONPATH: /opt/airflow/project
    command:
      - bash
      - -c
      - |
        python - <<'PYEOF'
        import json
        import os
        from pathlib import Path

        password = os.environ.get("AIRFLOW_ADMIN_PASSWORD")
        if password:
            username = os.environ.get("AIRFLOW_ADMIN_USERNAME", "airflow")
            passwords_file = Path(
                os.environ["AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE"]
            )
            passwords = {}
            if passwords_file.exists():
                passwords = json.loads(passwords_file.read_text() or "{}")
            passwords[username] = password
            passwords_file.write_text(json.dumps(passwords))
            passwords_file.chmod(0o600)
        PYEOF
        airflow db migrate
    depends_on:
      parser-db:
        condition: service_healthy
    volumes: &airflow-common-volumes
      - ./internship-parser/airflow/dags:/opt/airflow/dags
      - ./internship-parser/airflow/logs:/opt/airflow/logs
      - ./internship-parser:/opt/airflow/project
      - airflow_data:/opt/airflow

  airflow-api-server:
    build:
      context: ./internship-parser/airflow
      dockerfile: Dockerfile
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.3
    pids_limit: 100
    environment: *airflow-common-env
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

  airflow-scheduler:
    build:
      context: ./internship-parser/airflow
      dockerfile: Dockerfile
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.3
    pids_limit: 100
    environment: *airflow-common-env
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

  airflow-dag-processor:
    build:
      context: ./internship-parser/airflow
      dockerfile: Dockerfile
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    mem_limit: 192m
    mem_reservation: 64m
    cpus: 0.15
    pids_limit: 50
    environment: *airflow-common-env
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

  web:
    build:
      context: ./ric-crm-planner/front
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
        VITE_TESTING_URL: https://${TESTING_DOMAIN}
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      TESTING_DOMAIN: ${TESTING_DOMAIN}
    depends_on:
      - backend
      - testing-web
      - parser-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - django_static:/srv/django-static:ro

volumes:
  postgres_data:
  testing_postgres_data:
  django_static:
  caddy_data:
  caddy_config:
  parser_postgres_data:
  airflow_data:
