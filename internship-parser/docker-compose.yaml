services:
  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Официальный образ postgres понимает только POSTGRES_*,
      # поэтому мэппим наши DB_* переменные из .env в нужные имена
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Внутри docker-сети БД доступна по имени сервиса, а не localhost,
      # поэтому переопределяем то, что пришло из .env
      DB_HOST: postgres-db
      DB_PORT: 5432
      # RELOAD: "true"   # раскомментируйте для режима разработки с автоперезагрузкой
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - .:/app

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - .env
    environment: &airflow-common-env
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres-db:5432/${DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-change-this-before-production}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USERNAME:-airflow}:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json.generated
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-}
      DB_HOST: postgres-db
      DB_PORT: 5432
      PYTHONPATH: /opt/airflow/project
    command:
      - bash
      - -c
      - |
        python - <<'PYEOF'
        import json
        import os
        from pathlib import Path

        password = os.environ.get("AIRFLOW_ADMIN_PASSWORD")
        if password:
            username = os.environ.get("AIRFLOW_ADMIN_USERNAME", "airflow")
            passwords_file = Path(
                os.environ["AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE"]
            )
            passwords = {}
            if passwords_file.exists():
                passwords = json.loads(passwords_file.read_text() or "{}")
            passwords[username] = password
            passwords_file.write_text(json.dumps(passwords))
            passwords_file.chmod(0o600)
        PYEOF
        airflow db migrate
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_data:/opt/airflow

  airflow-api-server:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment: *airflow-common-env
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment: *airflow-common-env
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

  airflow-dag-processor:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment: *airflow-common-env
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes: *airflow-common-volumes

volumes:
  postgres_data:
  airflow_data:
