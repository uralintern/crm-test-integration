name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  APP_DOMAIN: meetuppoint.ru
  TESTING_DOMAIN: test.meetuppoint.ru
  VITE_API_BASE: ""
  VITE_USE_MOCK: "false"
  DJANGO_DEBUG: "0"
  DJANGO_SECRET_KEY: ci-only-dummy-django-secret-key-change-on-server
  DJANGO_ALLOWED_HOSTS: meetuppoint.ru,5.181.108.146,localhost,127.0.0.1,backend
  DJANGO_CSRF_TRUSTED_ORIGINS: https://meetuppoint.ru
  DJANGO_CORS_ALLOW_ALL_ORIGINS: "0"
  DJANGO_CORS_ALLOWED_ORIGINS: https://meetuppoint.ru,https://test.meetuppoint.ru
  DJANGO_CACHE_DIR: /app/.cache
  DB_NAME: crm_bd
  DB_USER: crm_user
  DB_PASSWORD: ci-only-crm-db-password
  DB_HOST: db
  DB_PORT: "5432"
  TESTING_DOMAIN_URL: https://test.meetuppoint.ru
  TESTING_SERVICE_URL: https://test.meetuppoint.ru
  TESTING_SERVICE_TOKEN: ci-only-shared-service-token
  TESTING_SSO_TICKET_TTL_SECONDS: "300"
  TESTING_DB_NAME: test_constructor
  TESTING_DB_USER: testing_user
  TESTING_DB_PASSWORD: ci-only-testing-db-password
  TESTING_ADMIN_EMAIL: admin@example.com
  TESTING_ADMIN_PASSWORD: ci-only-testing-admin-password
  TESTING_JWT_SECRET: ci-only-long-testing-jwt-secret-change-on-server
  TESTING_JWT_TTL_HOURS: "24"
  VK_ENABLED: "0"
  VK_GROUP_ID: "0"
  VK_ACCESS_TOKEN: ci-disabled
  VK_API_VERSION: "5.199"
  VK_API_BASE_URL: https://api.vk.com/method
  VK_CALLBACK_SECRET: ci-disabled
  VK_CONFIRMATION_CODE: ci-disabled
  VK_CHAT_LINK_BASE_URL: https://meetuppoint.ru
  VK_BOT_FRONTEND_URL: https://meetuppoint.ru
  VK_ORG_CHAT_URL: ""
  VK_ORG_CHAT_PEER_ID: "0"
  VK_CHAT_LINK_MAX_AGE_SECONDS: "2592000"
  VK_REQUEST_TIMEOUT_SECONDS: "5"
  AUTOMATION_INTERVAL_SECONDS: "60"
  RUN_MIGRATIONS: "1"
  RUN_COLLECTSTATIC: "1"

jobs:
  build:
    name: Build and publish images
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.image-vars.outputs.prefix }}
      image_tag: ${{ steps.image-vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: cp .env.example .env

      - name: Prepare image variables
        id: image-vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "prefix=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate docker compose files
        shell: bash
        run: |
          docker compose config --quiet
          IMAGE_PREFIX="${{ steps.image-vars.outputs.prefix }}" IMAGE_TAG="${{ steps.image-vars.outputs.tag }}" docker compose -f docker-compose.prod.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CRM backend image
        uses: docker/build-push-action@v6
        with:
          context: ./ric-crm-planner/back
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-backend:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-backend:latest
          cache-from: type=gha,scope=crm-backend
          cache-to: type=gha,mode=max,scope=crm-backend

      - name: Build CRM frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ric-crm-planner/front
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-web:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-web:latest
          build-args: |
            VITE_API_BASE=${{ env.VITE_API_BASE }}
            VITE_USE_MOCK=${{ env.VITE_USE_MOCK }}
            VITE_TESTING_URL=https://${{ env.TESTING_DOMAIN }}
          cache-from: type=gha,scope=crm-web
          cache-to: type=gha,mode=max,scope=crm-web

      - name: Build testing backend image
        uses: docker/build-push-action@v6
        with:
          context: ./test-constructor/backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-testing-backend:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-testing-backend:latest
          cache-from: type=gha,scope=testing-backend
          cache-to: type=gha,mode=max,scope=testing-backend

      - name: Build testing frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./test-constructor/frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-testing-web:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-testing-web:latest
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha,scope=testing-web
          cache-to: type=gha,mode=max,scope=testing-web

      - name: Build parser API image
        uses: docker/build-push-action@v6
        with:
          context: ./internship-parser
          dockerfile: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-parser-api:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-parser-api:latest
          cache-from: type=gha,scope=parser-api
          cache-to: type=gha,mode=max,scope=parser-api

      - name: Build parser Airflow image
        uses: docker/build-push-action@v6
        with:
          context: ./internship-parser/airflow
          dockerfile: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image-vars.outputs.prefix }}-parser-airflow:${{ steps.image-vars.outputs.tag }}
            ${{ steps.image-vars.outputs.prefix }}-parser-airflow:latest
          cache-from: type=gha,scope=parser-airflow
          cache-to: type=gha,mode=max,scope=parser-airflow

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            PROJECT_PATH="${{ secrets.VPS_PROJECT_PATH }}"
            if [ -z "$PROJECT_PATH" ]; then
              PROJECT_PATH="$HOME/crm-test-integration"
            fi

            cd "$PROJECT_PATH"
            if [ ! -f .env ]; then
              echo "Missing .env on VPS: $PROJECT_PATH/.env"
              echo "Create it from .env.example and fill real secrets before deployment."
              exit 1
            fi

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export IMAGE_PREFIX="${{ needs.build.outputs.image_prefix }}"
            export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
