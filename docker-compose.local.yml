services:
  backend:
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://testing.localhost"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "1"

  web:
    build:
      args:
        VITE_API_BASE: ""
        VITE_USE_MOCK: "false"
        VITE_TESTING_URL: "http://testing.localhost"
    environment:
      APP_DOMAIN: "http://localhost"
      TESTING_DOMAIN: "http://testing.localhost"
    ports: !override
      - "80:80"

  testing-backend:
    environment:
      CLIENT_URL: "http://testing.localhost"

  testing-web:
    build:
      args:
        VITE_API_BASE_URL: ""